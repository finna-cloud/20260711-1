<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARK-07｜方舟七號 生存終端</title>
<style>
:root{--bg:#070b0d;--panel:#101719;--line:#26383a;--mint:#7ef2cf;--amber:#f0b35c;--red:#ff6b64;--text:#dbe6e3;--muted:#78908c}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -10%,#183238 0,#090e10 42%,#040607 100%);color:var(--text);font:14px/1.65 system-ui,"Noto Sans TC",sans-serif;min-height:100vh}
button{font:inherit}.shell{max-width:980px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;border:1px solid var(--line);background:#0d1517dd;padding:14px 18px;box-shadow:0 0 35px #55e0c615}.brand{font-weight:800;letter-spacing:.22em;color:var(--mint);font-size:18px}.blink{animation:b 1.1s step-end infinite;color:var(--red)}@keyframes b{50%{opacity:.25}}.clock,.tiny{font:12px ui-monospace,monospace;color:var(--muted)}
.grid{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-top:14px}.card{border:1px solid var(--line);background:linear-gradient(145deg,#111a1cdd,#0b1113ee);padding:15px;box-shadow:inset 0 0 30px #0007}.card h2{font-size:12px;letter-spacing:.16em;color:var(--muted);margin:0 0 10px}.stat{margin:10px 0}.statline{display:flex;justify-content:space-between;font:12px ui-monospace,monospace}.bar{height:6px;background:#253033;margin-top:5px;overflow:hidden}.fill{height:100%;background:var(--mint);transition:.4s}.danger .fill{background:var(--red)}
.id{border-left:3px solid var(--amber);padding-left:10px;margin-bottom:16px}.id b{color:var(--amber)}.items{display:flex;flex-wrap:wrap;gap:6px}.tag{border:1px solid #37504d;padding:2px 7px;color:#a9c4bf;font-size:12px}.log{height:170px;overflow:auto;border:1px solid #1e2a2c;background:#060a0b;padding:10px;font:12px/1.6 ui-monospace,"Noto Sans TC",monospace;color:#9fb2ae}.log p{margin:0 0 5px}.log .hot{color:var(--amber)}
.screen{min-height:342px;position:relative;overflow:hidden}.screen:after{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,#fff0 0 3px,#7ef2cf08 4px)}.zone{color:var(--mint);font:12px ui-monospace,monospace;letter-spacing:.08em}.screen h1{font-size:25px;margin:7px 0 2px}.lead{color:#a9bbb8;max-width:70ch}.event{border-left:2px solid var(--red);padding:8px 12px;margin:18px 0;background:#ff6b6408}.event strong{color:#ff8d87}.choices{display:grid;gap:9px;position:relative;z-index:1}.choice{width:100%;text-align:left;padding:11px 13px;border:1px solid #34504d;color:var(--text);background:#111c1e;cursor:pointer;transition:.2s}.choice:hover,.choice:focus{border-color:var(--mint);color:var(--mint);transform:translateX(3px)}.choice span{color:var(--muted);float:right}.choice:disabled{opacity:.35;cursor:not-allowed;transform:none}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.small{border:1px solid #33484a;background:#0b1214;color:#a9bbb8;padding:7px 10px;cursor:pointer}.small:hover{color:var(--mint);border-color:var(--mint)}.send{margin-left:auto;border-color:var(--amber);color:var(--amber)}
.modal{display:none;position:fixed;inset:0;background:#000c;z-index:9;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modalbox{max-width:520px;background:#101719;border:1px solid var(--mint);padding:20px}.modal h3{color:var(--mint);margin-top:0}.modal textarea{width:100%;height:130px;background:#070b0d;color:#dbe6e3;border:1px solid #344;padding:10px}.toast{position:fixed;right:18px;bottom:18px;background:#182326;border:1px solid var(--mint);padding:9px 13px;opacity:0;transform:translateY(10px);transition:.2s;z-index:20}.toast.show{opacity:1;transform:none}
@media(max-width:720px){.grid{grid-template-columns:1fr}.clock{display:none}.send{margin-left:0}.shell{padding:8px}}
</style>
</head>
<body><main class="shell">
<header class="top"><div><div class="brand">ARK-07 // SURVIVAL TERMINAL</div><div class="tiny"><span class="blink">●</span> 灰潮監測連線中</div></div><div class="clock" id="clock"></div></header>
<div class="grid"><aside>
<section class="card"><h2>居民識別</h2><div class="id">代碼：<b>UNKNOWN</b><br>權限：等級 I／灰碼<br>位置：<span id="place">B區・白箱</span></div><div id="stats"></div></section>
<section class="card"><h2>持有物資</h2><div class="items" id="items"></div></section>
<section class="card"><h2>終端紀錄</h2><div class="log" id="log"></div></section>
</aside><section>
<article class="card screen"><div class="zone" id="zone"></div><h1 id="title"></h1><p class="lead" id="text"></p><div class="event" id="event"></div><div class="choices" id="choices"></div></article>
<div class="actions"><button class="small" id="save">儲存進度</button><button class="small" id="load">讀取進度</button><button class="small" id="reset">重新開始</button><button class="small send" id="send">將本回合送入 SillyTavern</button></div>
</section></div></main>
<div class="modal" id="modal"><div class="modalbox"><h3>回合訊息</h3><p class="tiny">若無法自動填入 SillyTavern，請複製以下內容貼進聊天室。</p><textarea id="payload"></textarea><div class="actions"><button class="small" id="copy">複製文字</button><button class="small" id="close">關閉</button></div></div></div><div class="toast" id="toast"></div>
<script>
const initial={scene:'wake',hunger:55,water:48,fatigue:35,stress:20,infection:0,trust:35,items:['臨時居民證','破損外套','空水壺','未知金屬牌'],history:[],turn:1,last:''};let s={...initial,items:[...initial.items],history:[]};
const scenes={
wake:{zone:'P001｜2049-03-18 06:40｜B區・白箱',title:'第六隔離室',text:'冷白燈管發出細碎電流聲。白洛將半杯乾淨飲水推到安全線內，門外忽然響起隔離警報。透明證物袋中的未知金屬牌，在燈下閃過一道不自然的刻痕。',event:'<strong>警戒事件：</strong>走廊深處傳來骨頭敲擊金屬的聲音。白洛正在等待你的回答。',choices:[['坦白失憶並喝下半杯水','trust+6,water+18','corridor','我坦白自己失去記憶，先喝下白洛遞來的水。'],['要求先看自己的金屬牌','stress+4,trust-3','plate','我拒絕回答，要求先確認那枚未知金屬牌。'],['趁警報響起觀察出口','fatigue+3,trust-6','escape','我利用警報分散注意，暗中觀察隔離室出口與警衛配置。']]},
plate:{zone:'P002｜B區・白箱',title:'不屬於方舟的編碼',text:'白洛沒有立刻拒絕。他把證物袋貼近玻璃，刮痕下浮出「07-Ω」字樣；這不是居民識別碼。監測器忽然對金屬牌發出一次短促蜂鳴。',event:'<strong>異常：</strong>感染檢測仍為陰性，但金屬牌與白箱地下層設備產生未知共振。',choices:[['以情報交換金屬牌','trust+5,stress-2','corridor','我提出用自己記得的廢墟線索交換金屬牌的情報。'],['伸手奪回證物袋','fatigue+7,stress+8','alarm','我突然越過安全線，試圖奪回金屬牌。']]},
escape:{zone:'P002｜B區・白箱',title:'三秒的監控盲區',text:'警衛的視線被推床吸引。門鎖因隔離警報短暫轉為黃燈，你看見牆角維修板後有一條狹窄管線。白洛卻像早已察覺般看向你。',event:'<strong>判定：</strong>擲 1D20＋求生修正；12 以上可進入維修通道。',choices:[['冒險鑽入維修通道','roll:12','tunnel','我抓住三秒盲區，鑽進隔離室的維修通道。'],['停下並接受白洛盤問','trust+3,stress-3','corridor','我放棄逃跑，轉身接受白洛的盤問。']]},
corridor:{zone:'P002｜B區・白箱走廊',title:'隔離門後的抓痕',text:'白洛替你掛上灰碼臨時牌。走廊盡頭的氣密門正在震動，一名醫療警衛倒在地上，防護面罩內爬滿霧狀菌絲。',event:'<strong>即時任務：</strong>救援警衛，或封鎖第七隔離區。你的選擇會被醫療部記錄。',choices:[['協助白洛救援警衛','infection+8,fatigue+8,trust+10','med','我戴上備用面罩，協助白洛救援倒地的醫療警衛。'],['先封死第七隔離區','stress+5,trust-2','sealed','我按下緊急封鎖，先阻止污染擴散。'],['追查警報前被推走的病患','water-6,fatigue+6','trail','我沿著推床留下的血痕，追查被匆忙移走的病患。']]},
tunnel:{zone:'P003｜C區地下管線',title:'鐵肺的呼吸聲',text:'你跌進悶熱管道，巨大發電機的震動穿過骨頭。空水壺旁多了一枚不知何時掉出的黃銅鑰匙，上面刻著「C-17」。',event:'<strong>獲得物資：</strong>C-17 黃銅鑰匙。遠處有人拖著扳手走近。',gain:'C-17黃銅鑰匙',choices:[['主動呼叫工程人員','trust+2','engineer','我收起鑰匙，向管道外的工程人員表明身分。'],['躲入陰影繼續前進','fatigue+6,stress+5','end','我熄滅終端光源，沿管線深處繼續潛行。']]},
alarm:{zone:'P003｜B區・白箱',title:'紅色封鎖',text:'警衛拔槍的速度比你預想更快。白洛卻抬手壓低槍口；同一瞬間，金屬牌在證物袋中自行裂開，露出一小片黑色資料晶片。',event:'<strong>關鍵線索：</strong>資料晶片可能記錄你的過去，也可能是灰潮誘餌。',gain:'黑色資料晶片',choices:[['交給白洛共同解碼','trust+12','end','我把黑色資料晶片交給白洛，要求在場共同解碼。'],['藏起晶片拒絕合作','stress+7,trust-10','end','我趁混亂藏起資料晶片，拒絕任何人讀取。']]},
med:{zone:'P003｜B區・急救通道',title:'面罩裡的低語',text:'你拖回警衛時，霧狀菌絲隔著面罩貼近你的視野。檢測器響了一聲，隨即恢復綠燈。白洛看著你，第一次露出真正的驚疑。',event:'<strong>章節完成：</strong>白箱救援成功。已解鎖「醫療部觀察對象」路線。',choices:[['完成本章並送出結果','stress-4','end','我完成救援，接受白洛立即進行第二次感染檢測。']]},
sealed:{zone:'P003｜B區・控制室',title:'門內還有人',text:'厚重氣密門落下。通訊器裡傳來一個孩子的哭聲，醫療部名冊卻顯示第七隔離區應該無人。白洛的表情冷了下來。',event:'<strong>道德事件：</strong>封鎖保住了白箱，也可能困住一名未登記居民。',choices:[['冒險重新開門救人','infection+12,stress+8','end','我要求重新開啟隔離門，進去尋找那名孩子。'],['維持封鎖並調查名冊','trust+4,stress+4','end','我維持封鎖，要求立刻調閱第七隔離區完整紀錄。']]},
trail:{zone:'P003｜B區・地下電梯',title:'不存在的樓層',text:'血痕停在一部沒有按鍵的貨梯前。未知金屬牌靠近門縫時，樓層顯示器亮起「B-0」。門後傳來培養槽運作的低鳴。',event:'<strong>隱藏路線：</strong>已發現白箱地下實驗層入口。',choices:[['刷入未知金屬牌','infection+4,stress+10','end','我用未知金屬牌啟動貨梯，前往不存在的 B-0 層。'],['記下位置返回白洛身邊','trust+5','end','我記下地下電梯的位置，先返回白洛身邊。']]},
engineer:{zone:'P003｜C區・鐵肺',title:'工程部主管',text:'扳手聲停下。沈牧從蒸汽後走出，視線落在 C-17 鑰匙上：「那扇門，三年前就焊死了。你從哪拿到的？」',event:'<strong>章節完成：</strong>已提前接觸沈牧，解鎖「鐵肺故障」支線。',choices:[['完成本章並送出結果','','end','我向沈牧展示 C-17 鑰匙，詢問三年前的封鎖事故。']]},
end:{zone:'CHAPTER 01 COMPLETE',title:'灰碼居民',text:'方舟終端已記錄你的選擇。接下來可將回合摘要送入 SillyTavern，讓角色卡依照狀態與行動繼續生成劇情。',event:'<strong>提示：</strong>按下「將本回合送入 SillyTavern」。若瀏覽器阻止跨頁控制，會自動顯示可複製的文字。',choices:[]}
};
function clamp(n){return Math.max(0,Math.min(100,n))}function apply(rule){if(!rule)return true;if(rule.startsWith('roll:')){let d=1+Math.floor(Math.random()*20),t=+rule.split(':')[1];add(`擲骰 1D20＝${d}｜難度 ${t}`,d>=t);if(d<t){s.stress=clamp(s.stress+7);toast('判定失敗：精神壓力 +7');return false}toast('判定成功');return true}rule.split(',').forEach(x=>{let m=x.match(/(hunger|water|fatigue|stress|infection|trust)([+-]\d+)/);if(m)s[m[1]]=clamp(s[m[1]]+(+m[2]))});return true}
function choose(c){let [label,rule,next,msg]=c;if(!apply(rule)){s.last=`我嘗試「${label}」，但行動判定失敗。`;s.history.push(s.last);s.scene='corridor'}else{s.last=msg;s.history.push(msg);s.scene=next}s.turn++;render()}
function add(t,hot=false){let p=document.createElement('p');p.textContent=`> ${t}`;if(hot)p.className='hot';document.querySelector('#log').prepend(p)}
function render(){let x=scenes[s.scene];if(x.gain&&!s.items.includes(x.gain)){s.items.push(x.gain);add(`獲得：${x.gain}`,true)}document.querySelector('#zone').textContent=x.zone;document.querySelector('#title').textContent=x.title;document.querySelector('#text').textContent=x.text;document.querySelector('#event').innerHTML=x.event;document.querySelector('#place').textContent=(x.zone.match(/[A-G]區[^｜]*/)||['未知區域'])[0];document.querySelector('#choices').innerHTML='';x.choices.forEach(c=>{let b=document.createElement('button');b.className='choice';b.innerHTML=`${c[0]}<span>▶</span>`;b.onclick=()=>choose(c);document.querySelector('#choices').append(b)});let labels={hunger:'飽食度',water:'飲水',fatigue:'疲勞',stress:'精神壓力',infection:'感染風險',trust:'白洛信任'};document.querySelector('#stats').innerHTML=Object.entries(labels).map(([k,v])=>`<div class="stat ${(['fatigue','stress','infection'].includes(k)&&s[k]>=65)?'danger':''}"><div class="statline"><span>${v}</span><b>${s[k]}%</b></div><div class="bar"><div class="fill" style="width:${s[k]}%"></div></div></div>`).join('');document.querySelector('#items').innerHTML=s.items.map(i=>`<span class="tag">${i}</span>`).join('')}
function summary(){return `[ARK-07 生存終端｜第 ${s.turn} 回合]\n地點：${document.querySelector('#place').textContent}\n行動：${s.last||'在第六隔離室醒來，正面對白洛的盤問。'}\n狀態：飽食 ${s.hunger}%／飲水 ${s.water}%／疲勞 ${s.fatigue}%／精神壓力 ${s.stress}%／感染風險 ${s.infection}%\n物資：${s.items.join('、')}\n請依角色卡與世界書延續劇情，不要替我決定下一步，並在回覆開頭更新完整狀態列。`}
function toast(t){let e=document.querySelector('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1700)}
document.querySelector('#save').onclick=()=>{localStorage.setItem('ark07-save',JSON.stringify(s));toast('進度已儲存')};document.querySelector('#load').onclick=()=>{let v=localStorage.getItem('ark07-save');if(v){s=JSON.parse(v);render();toast('進度已讀取')}else toast('找不到存檔')};document.querySelector('#reset').onclick=()=>{if(confirm('確定重新開始？')){s={...initial,items:[...initial.items],history:[]};document.querySelector('#log').innerHTML='';render()}};
document.querySelector('#send').onclick=()=>{let msg=summary(),ok=false;try{let d=window.parent.document,ta=d.querySelector('#send_textarea'),btn=d.querySelector('#send_but');if(ta){ta.value=msg;ta.dispatchEvent(new Event('input',{bubbles:true}));ta.focus();ok=true;if(btn&&confirm('已填入 SillyTavern，是否立即送出？'))btn.click()}}catch(e){}if(ok)toast('已填入 SillyTavern');else{document.querySelector('#payload').value=msg;document.querySelector('#modal').classList.add('open')}};document.querySelector('#copy').onclick=async()=>{await navigator.clipboard.writeText(document.querySelector('#payload').value);toast('已複製')};document.querySelector('#close').onclick=()=>document.querySelector('#modal').classList.remove('open');setInterval(()=>document.querySelector('#clock').textContent=new Date().toLocaleString('zh-TW',{hour12:false}),1000);render();add('終端初始化完成');
</script></body></html>
